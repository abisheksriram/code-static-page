<!DOCTYPE html>
<html>
<head>
  <title>Details</title>
  <style>
    body { font-family:Arial; background:#f5f7fb; padding:20px; }
    .card { background:white; padding:20px; border-radius:10px; }
  </style>
</head>

<body>

<div class="card">
  <h3>Details</h3>
  <div id="details">Loading...</div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");
const plant = params.get("plant");

fetch('data.json')
  .then(res => res.json())
  .then(data => {

    const result = data.find(d => d.id === id || d.plant === plant);

    document.getElementById("details").innerHTML = result ? `
      <p><b>Plant:</b> ${result.plant}</p>
      <p><b>Part:</b> ${result.part}</p>
      <p><b>ID:</b> ${result.id}</p>
      <p><b>Name:</b> ${result.name}</p>
      <p><b>Reference:</b> ${result.reference}</p>
    ` : "No data found";

  });
</script>

</body>
</html>
