<!DOCTYPE html>
<html>
<head>
  <title>Phytochemical Database</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">

  <style>
    body { background:#f5f7fb; font-family:Segoe UI; }
    .header { background:#0d6efd; color:white; padding:15px; font-size:20px; }
    .container-box { background:white; padding:20px; margin-top:20px; border-radius:10px; }
    table.dataTable thead { background:#212529; color:white; }
    .filters input { width:100%; font-size:12px; }
  </style>
</head>

<body>

<div class="header">IMPPAT - Phytochemical Database</div>

<div class="container container-box">
  <table id="dataTable" class="table table-striped">
    <thead>
      <tr>
        <th>Plant</th>
        <th>Part</th>
        <th>ID</th>
        <th>Name</th>
        <th>Reference</th>
      </tr>
      <tr class="filters">
        <th><input placeholder="Filter"></th>
        <th><input placeholder="Filter"></th>
        <th><input placeholder="Filter"></th>
        <th><input placeholder="Filter"></th>
        <th><input placeholder="Filter"></th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

<script>
fetch('data.json')
  .then(res => res.json())
  .then(data => {

    const table = $('#dataTable').DataTable({
      data: data,
      pageLength: 10,
      columns: [
        {
          data: 'plant',
          render: data => `<a href="detail.html?plant=${encodeURIComponent(data)}">${data}</a>`
        },
        { data: 'part' },
        {
          data: 'id',
          render: data => `<a href="detail.html?id=${data}">${data}</a>`
        },
        { data: 'name' },
        { data: 'reference' }
      ]
    });

    // column filters
    $('#dataTable thead tr.filters th').each(function (i) {
      $('input', this).on('keyup change', function () {
        table.column(i).search(this.value).draw();
      });
    });

  });
</script>

</body>
</html>
